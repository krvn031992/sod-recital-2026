<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Ticket Check-in</title>
  <link rel="icon" type="image/png" href="assets/logo-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <div class="brand">
        <img class="brand__logo" src="assets/logo-icon.png" alt="State of Dance logo" />
        <span class="brand__name">Ticket Check-in</span>
      </div>
    </div>
  </header>

  <main class="verify">
    <div class="verify__card" data-card>
      <p class="verify__msg" data-msg>Loading ticket…</p>
    </div>
  </main>

  <script src="config.js?v=3"></script>
  <script src="verify.js?v=3"></script>
</body>
</html>
